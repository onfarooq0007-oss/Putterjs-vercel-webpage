<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puter AI Chat</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15.5px;
    }
    .user {
      align-self: flex-end;
      background: #2383e2;
      border-bottom-right-radius: 4px;
    }
    .ai {
      align-self: flex-start;
      background: #2a2a2a;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 16px 24px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }
    input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 9999px;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(35, 131, 226, 0.3);
    }
    button {
      background: #2383e2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .model-select {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .new-chat {
      background: #333;
      color: white;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #2383e2;
    }
    .empty-state {
      text-align: center;
      margin-top: 100px;
      color: #888;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">Puter AI</div>
    <div class="new-chat" onclick="newChat()">+ New Chat</div>
    
    <label style="color:#888; font-size:14px; margin-bottom:8px;">Choose AI Agent / Model</label>
    <select id="modelSelect" class="model-select" onchange="changeModel()">
      <!-- Models will be loaded here automatically -->
    </select>
    
    <div style="margin-top:auto; font-size:13px; color:#666;">
      Powered by Puter.js<br>
      Sign in to use AI
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="main">
    <div class="header">
      <div style="font-weight:600;">Puter AI Chat</div>
      <button onclick="signIn()">Sign In with Puter</button>
    </div>

    <div id="chatContainer" class="chat-container">
      <div class="empty-state">
        <h2>Welcome to Puter AI Chat</h2>
        <p>Sign in and start chatting with powerful AI models</p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let currentModel = "gpt-5-nano";  // default
    let messages = [];
    let isSignedIn = false;

    // Load available models from Puter
    async function loadModels() {
      const select = document.getElementById('modelSelect');
      try {
        const models = await puter.ai.listModels();
        select.innerHTML = ''; // clear

        models.forEach(model => {
          const option = document.createElement('option');
          option.value = model.id;
          option.textContent = model.name || model.id;
          if (model.id === currentModel) option.selected = true;
          select.appendChild(option);
        });
      } catch (e) {
        // Fallback popular models if list fails
        const popular = [
          "gpt-5-nano", "claude-opus-4-7", "gemini-2.5-flash", 
          "grok-4", "claude-sonnet-4-5", "deepseek-v3"
        ];
        popular.forEach(m => {
          const option = document.createElement('option');
          option.value = m;
          option.textContent = m;
          if (m === currentModel) option.selected = true;
          select.appendChild(option);
        });
      }
    }

    function changeModel() {
      currentModel = document.getElementById('modelSelect').value;
      addMessage("system", `Switched to model: ${currentModel}`);
    }

    async function signIn() {
      try {
        await puter.auth.signIn();
        isSignedIn = true;
        addMessage("system", "✅ Signed in successfully! You can now chat.");
        loadModels();
      } catch (err) {
        addMessage("system", "❌ Sign in failed. Please try again.");
      }
    }

    function addMessage(sender, text) {
      messages.push({ sender, text });
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';

      if (messages.length === 0) {
        container.innerHTML = `<div class="empty-state"><h2>Welcome to Puter AI Chat</h2><p>Sign in and start chatting</p></div>`;
        return;
      }

      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.sender === 'user' ? 'user' : 'ai'}`;
        div.innerHTML = msg.text.replace(/\n/g, '<br>');
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      if (!isSignedIn) {
        addMessage("system", "Please sign in first!");
        return;
      }

      addMessage("user", text);
      input.value = '';

      const thinkingMsgIndex = messages.length;
      addMessage("ai", "Thinking...");

      try {
        const response = await puter.ai.chat(text, { model: currentModel });
        // Replace thinking message
        messages[thinkingMsgIndex].text = response;
        renderMessages();
      } catch (err) {
        messages[thinkingMsgIndex].text = "❌ Error: " + err.message;
        renderMessages();
      }
    }

    function newChat() {
      messages = [];
      renderMessages();
    }

    // Auto load models when page opens
    window.onload = () => {
      loadModels();
    };
  </script>
</body>
</html>
