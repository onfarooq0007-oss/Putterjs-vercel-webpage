<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Puter AI Chat</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .header {
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .logo { font-size: 20px; font-weight: 700; color: #2383e2; }
    
    .top-bar {
      background: #1a1a1a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #333;
    }
    
    .model-select {
      flex: 1;
      padding: 12px 14px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 12px;
      font-size: 15px;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #0f0f0f;
    }
    
    .message {
      max-width: 88%;
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.55;
      font-size: 16px;
      word-wrap: break-word;
    }
    
    .user { align-self: flex-end; background: #2383e2; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #2a2a2a; border-bottom-left-radius: 6px; }
    .system { align-self: center; background: #333; font-size: 14px; padding: 8px 16px; border-radius: 9999px; text-align: center; max-width: 90%; }
    
    .media-container img, .media-container video {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
      display: block;
    }
    
    .input-area {
      padding: 12px 16px 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      position: sticky;
      bottom: 0;
    }
    
    .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
    
    input {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 9999px;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }
    
    button {
      background: #2383e2;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 16px;
    }
    
    .new-chat-btn {
      background: #333;
      color: white;
      padding: 10px 16px;
      border-radius: 9999px;
      font-size: 14px;
      white-space: nowrap;
    }
    
    .empty-state {
      text-align: center;
      margin-top: 80px;
      color: #888;
      padding: 0 20px;
    }
    
    .sign-in-btn {
      background: #2383e2;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 9999px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Puter AI</div>
    <button class="sign-in-btn" onclick="signIn()">Sign In</button>
  </div>

  <div class="top-bar">
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <select id="modelSelect" class="model-select" onchange="changeModel()"></select>
  </div>

  <div id="chatContainer" class="chat-container"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let currentModel = "gemini-3.1-flash-image-preview"; // Good for image generation
    let messages = [];
    let isSignedIn = false;

    // Improved response text + media extraction
    function getResponseTextAndMedia(response) {
      let text = "No response received.";
      let mediaHtml = "";

      if (!response) return { text, mediaHtml };

      // Extract text
      if (typeof response === "string") text = response;
      else if (response.message && response.message.content) text = response.message.content;
      else if (response.content) text = response.content;
      else if (response.text) text = response.text;

      // Handle images from image-generation models
      if (response.message && response.message.images && response.message.images.length > 0) {
        response.message.images.forEach(imgUrl => {
          mediaHtml += `<img src="${imgUrl}" alt="Generated image">`;
        });
      } else if (response.images && response.images.length > 0) {
        response.images.forEach(imgUrl => {
          mediaHtml += `<img src="${imgUrl}" alt="Generated image">`;
        });
      }

      // Handle videos (if any model returns video URLs)
      if (response.message && response.message.videos && response.message.videos.length > 0) {
        response.message.videos.forEach(vidUrl => {
          mediaHtml += `<video controls><source src="${vidUrl}" type="video/mp4">Your browser does not support video.</video>`;
        });
      } else if (response.videos && response.videos.length > 0) {
        response.videos.forEach(vidUrl => {
          mediaHtml += `<video controls><source src="${vidUrl}" type="video/mp4">Your browser does not support video.</video>`;
        });
      }

      return { text: String(text).trim(), mediaHtml };
    }

    async function loadModels() {
      const select = document.getElementById('modelSelect');
      select.innerHTML = '<option>Loading models...</option>';
      try {
        const models = await puter.ai.listModels();
        select.innerHTML = '';
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name || m.id;
          if (m.id === currentModel) opt.selected = true;
          select.appendChild(opt);
        });
      } catch (e) {
        // Fallback
        const popular = ["gemini-3.1-flash-image-preview", "claude-opus-4-5", "gpt-5-nano", "grok-4"];
        select.innerHTML = '';
        popular.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          if (m === currentModel) opt.selected = true;
          select.appendChild(opt);
        });
      }
    }

    function changeModel() {
      currentModel = document.getElementById('modelSelect').value;
      addMessage("system", `✅ Switched to: ${currentModel}`);
    }

    async function signIn() {
      try {
        await puter.auth.signIn();
        isSignedIn = true;
        addMessage("system", "✅ Signed in successfully!");
        loadModels();
      } catch (err) {
        addMessage("system", "❌ Sign in failed. Try again.");
      }
    }

    function addMessage(sender, text, mediaHtml = "") {
      messages.push({ sender, text, mediaHtml });
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';

      if (messages.length === 0) {
        container.innerHTML = `<div class="empty-state"><h2>Welcome to Puter AI</h2><p>Sign in and try image prompts like "Create an image of an Indian boy"</p></div>`;
        return;
      }

      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.sender}`;
        div.innerHTML = String(msg.text).replace(/\n/g, '<br>') + (msg.mediaHtml || "");
        container.appendChild(div);
      });
      
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      if (!isSignedIn) {
        addMessage("system", "Please sign in first.");
        return;
      }

      addMessage("user", text);
      input.value = '';

      const thinkingIndex = messages.length;
      addMessage("ai", "Thinking...");

      try {
        const response = await puter.ai.chat(text, { model: currentModel });
        const { text: aiText, mediaHtml } = getResponseTextAndMedia(response);
        
        messages[thinkingIndex].text = aiText || "Generated image/video.";
        messages[thinkingIndex].mediaHtml = mediaHtml;
        renderMessages();
      } catch (err) {
        messages[thinkingIndex].text = `❌ Error: ${err.message || "Failed to get reply."}`;
        renderMessages();
      }
    }

    function newChat() {
      messages = [];
      renderMessages();
    }

    window.onload = () => {
      loadModels();
      renderMessages();
    };
  </script>
</body>
</html>
