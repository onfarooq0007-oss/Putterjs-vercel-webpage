<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Puter AI Chat</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .header {
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #2383e2;
    }
    
    .top-bar {
      background: #1a1a1a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #333;
    }
    
    .model-select {
      flex: 1;
      padding: 12px 14px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 12px;
      font-size: 15px;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #0f0f0f;
    }
    
    .message {
      max-width: 88%;
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.55;
      font-size: 16px;
      word-wrap: break-word;
    }
    
    .user {
      align-self: flex-end;
      background: #2383e2;
      border-bottom-right-radius: 6px;
    }
    
    .ai {
      align-self: flex-start;
      background: #2a2a2a;
      border-bottom-left-radius: 6px;
    }
    
    .system {
      align-self: center;
      background: #333;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 9999px;
      text-align: center;
      max-width: 90%;
    }
    
    .input-area {
      padding: 12px 16px 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      position: sticky;
      bottom: 0;
    }
    
    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    input {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 9999px;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(35, 131, 226, 0.4);
    }
    
    button {
      background: #2383e2;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 16px;
    }
    
    .new-chat-btn {
      background: #333;
      color: white;
      padding: 10px 16px;
      border-radius: 9999px;
      font-size: 14px;
      white-space: nowrap;
    }
    
    .empty-state {
      text-align: center;
      margin-top: 80px;
      color: #888;
      padding: 0 20px;
    }
    
    .sign-in-btn {
      background: #2383e2;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 9999px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Puter AI</div>
    <button class="sign-in-btn" onclick="signIn()">Sign In</button>
  </div>

  <div class="top-bar">
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <select id="modelSelect" class="model-select" onchange="changeModel()"></select>
  </div>

  <div id="chatContainer" class="chat-container"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Type your message..." 
        onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let currentModel = "claude-opus-4-5";
    let messages = [];
    let isSignedIn = false;

    // Stronger extraction of AI response text
    function getResponseText(response) {
      if (!response) return "No response received.";

      // Case 1: Plain string
      if (typeof response === "string") return response;

      // Case 2: Standard Puter format { message: { content: "..." } }
      if (response.message && typeof response.message === "object") {
        if (response.message.content) return response.message.content;
        if (response.message.text) return response.message.text;
      }

      // Case 3: Direct content
      if (response.content) return response.content;
      if (response.text) return response.text;

      // Case 4: Nested deeper
      if (response.choices && response.choices[0] && response.choices[0].message) {
        return response.choices[0].message.content || "No content";
      }

      // Last resort: Try to show useful info
      try {
        return JSON.stringify(response, null, 2);
      } catch (e) {
        return "[Complex response received]";
      }
    }

    async function loadModels() {
      const select = document.getElementById('modelSelect');
      select.innerHTML = '<option>Loading models...</option>';
      
      try {
        const models = await puter.ai.listModels();
        select.innerHTML = '';
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name || m.id;
          if (m.id === currentModel) opt.selected = true;
          select.appendChild(opt);
        });
      } catch (e) {
        // Fallback
        select.innerHTML = '';
        ["claude-opus-4-5", "gpt-5-nano", "gemini-2.5-flash", "grok-4"].forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          if (m === currentModel) opt.selected = true;
          select.appendChild(opt);
        });
      }
    }

    function changeModel() {
      currentModel = document.getElementById('modelSelect').value;
      addMessage("system", `✅ Switched to: ${currentModel}`);
    }

    async function signIn() {
      try {
        await puter.auth.signIn();
        isSignedIn = true;
        addMessage("system", "✅ Signed in! You can now chat.");
        loadModels();
      } catch (err) {
        addMessage("system", "❌ Sign in failed. Try again.");
      }
    }

    function addMessage(sender, text) {
      messages.push({ sender, text });
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>Welcome to Puter AI</h2>
            <p>Sign in and chat with Claude, GPT, Gemini and more.</p>
          </div>`;
        return;
      }

      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.sender}`;
        div.innerHTML = String(msg.text).replace(/\n/g, '<br>');
        container.appendChild(div);
      });
      
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      if (!isSignedIn) {
        addMessage("system", "Please sign in first.");
        return;
      }

      addMessage("user", text);
      input.value = '';

      const thinkingIndex = messages.length;
      addMessage("ai", "Thinking...");

      try {
        const response = await puter.ai.chat(text, { model: currentModel });
        const aiText = getResponseText(response);
        messages[thinkingIndex].text = aiText;
        renderMessages();
      } catch (err) {
        messages[thinkingIndex].text = "❌ Error: " + (err.message || "Failed to get reply.");
        renderMessages();
      }
    }

    function newChat() {
      messages = [];
      renderMessages();
    }

    window.onload = () => {
      loadModels();
      renderMessages();
    };
  </script>
</body>
</html>
